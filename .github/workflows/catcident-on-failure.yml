name: Catcident on failure

on:
  workflow_dispatch:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run tests
        run: npm test

      - name: File catcident report
        if: ${{ failure() }}
        uses: ./
        with:
          seed: ${{ github.workflow }}-${{ github.run_id }}-${{ github.job }}
